<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leadoverse — Coming Soon</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      width: 70%;
      border: none;
      border-radius: 6px;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Leadoverse</h1>
    <p>AI-powered growth system launching soon.</p>

    <form onsubmit="alert('Thanks! We’ll notify you.'); return false;">
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Notify Me</button>
    </form>

    <div class="footer">
      © 2026 Leadoverse. All rights reserved.
    </div>
  </div>

</body>
</html>
